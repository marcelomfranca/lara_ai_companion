name: lara_ai
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.1.0
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.3
  sqflite: ^2.4.2
  flutter_secure_storage: ^10.0.0
  firebase_auth: ^6.1.4
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.2
  firebase_core: ^4.4.0
  google_sign_in: ^7.2.0
  email_validator: ^3.0.0
  flutter_smart_dialog: ^4.9.8+9
  animated_snack_bar: ^0.4.0
  google_generative_ai: ^0.4.7
  flutter_markdown: ^0.7.7+1
  shared_preferences: ^2.5.4
  shared_preferences_android: ^2.4.20
  url_launcher: ^6.3.2
  path: ^1.9.1
  uuid: ^4.5.3
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  #code generator
  riverpod_generator: ^4.0.3
  build_runner: ^2.11.1

  #custom linter
  riverpod_lint: ^3.1.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        # Thin (100)
        - asset: assets/fonts_inter/Inter_18pt_Thin.ttf
          weight: 100
        - asset: assets/fonts_inter/Inter_18pt_ThinItalic.ttf
          weight: 100
          style: italic

        # ExtraLight (200)
        - asset: assets/fonts_inter/Inter_18pt_ExtraLight.ttf
          weight: 200
        - asset: assets/fonts_inter/Inter_18pt_ExtraLightItalic.ttf
          weight: 200
          style: italic

        # Light (300)
        - asset: assets/fonts_inter/Inter_18pt_Light.ttf
          weight: 300
        - asset: assets/fonts_inter/Inter_18pt_LightItalic.ttf
          weight: 300
          style: italic

        # Regular (400)
        - asset: assets/fonts_inter/Inter_18pt_Regular.ttf
          weight: 400
        - asset: assets/fonts_inter/Inter_18pt_Italic.ttf
          weight: 400
          style: italic

        # Medium (500)
        - asset: assets/fonts_inter/Inter_18pt_Medium.ttf
          weight: 500
        - asset: assets/fonts_inter/Inter_18pt_MediumItalic.ttf
          weight: 500
          style: italic

        # SemiBold (600)
        - asset: assets/fonts_inter/Inter_18pt_SemiBold.ttf
          weight: 600
        - asset: assets/fonts_inter/Inter_18pt_SemiBoldItalic.ttf
          weight: 600
          style: italic

        # Bold (700)
        - asset: assets/fonts_inter/Inter_18pt_Bold.ttf
          weight: 700
        - asset: assets/fonts_inter/Inter_18pt_BoldItalic.ttf
          weight: 700
          style: italic

        # ExtraBold (800)
        - asset: assets/fonts_inter/Inter_18pt_ExtraBold.ttf
          weight: 800
        - asset: assets/fonts_inter/Inter_18pt_ExtraBoldItalic.ttf
          weight: 800
          style: italic

        # Black (900)
        - asset: assets/fonts_inter/Inter_18pt_Black.ttf
          weight: 900
        - asset: assets/fonts_inter/Inter_18pt_BlackItalic.ttf
          weight: 900
          style: italic
